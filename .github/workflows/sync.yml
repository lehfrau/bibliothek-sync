name: Bibliothek Kalender Sync Laura

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4.2.2

      - name: Python einrichten
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: |
          pip install requests beautifulsoup4 \
            google-auth google-auth-oauthlib google-api-python-client

      - name: Google Token aus Secret wiederherstellen
        run: |
          echo '${{ secrets.GOOGLE_TOKEN_JSON }}' > token.json

      - name: Google Credentials aus Secret wiederherstellen
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Sync ausführen
        env:
          BIBL_AUSWEIS_LAURA:  ${{ secrets.BIBL_AUSWEIS_LAURA }}
          BIBL_PASSWORT_LAURA: ${{ secrets.BIBL_PASSWORT_LAURA }}
          BIBL_AUSWEIS_BENNY:  ${{ secrets.BIBL_AUSWEIS_BENNY }}
          BIBL_PASSWORT_BENNY: ${{ secrets.BIBL_PASSWORT_BENNY }}
          HTML_PASSWORT:       ${{ secrets.HTML_PASSWORT }}
        run: python bibliothek_kalender_sync.py

      - name: Verlauf committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add verlauf.xml verlauf.html
          git diff --cached --quiet || git commit -m "Verlauf aktualisiert $(date +'%Y-%m-%d')"
          git push
